openapi: 3.0.3
info:
  title: Jakarta EE Purchase Order Tracking API
  version: 0.1.0
  description: OpenAPI specification for EMW Purchase Order Tracking API
servers:
  - url: http://localhost:8080/emw
    description: Local WildFly deployment
paths:
  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags:
        - Purchase Order
      summary: Lists all purchase orders
      description: Returns all purchase orders from the database.
      parameters:
        - in: query
          name: paymentStatus
          required: false
          description: Filters purchase orders by payment status.
          schema:
            type: string
            enum:
              - ONGOING
              - FULLY_PAID
      responses:
        '200':
          description: Purchase order list response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchaseOrderDTO'
              examples:
                sample:
                  value:
                    - id: 1
                      orderNumber: PO-2026-0001
                      customerName: Acme Trading
                      orderDate: '2026-03-01'
                      paymentStatus: FULLY_PAID
                      items:
                        - productName: Laptop Dock
                          quantity: 2
                          unitPrice: 125.50
                        - productName: USB-C Cable
                          quantity: 10
                          unitPrice: 8.99
                    - id: 2
                      orderNumber: PO-2026-0002
                      customerName: Blue River Supplies
                      orderDate: '2026-03-05'
                      paymentStatus: ONGOING
                      items:
                        - productName: Mechanical Keyboard
                          quantity: 3
                          unitPrice: 75.00
components:
  schemas:
    PurchaseOrderDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        orderNumber:
          type: string
          example: PO-2026-0001
        customerName:
          type: string
          example: Acme Trading
        orderDate:
          type: string
          format: date
          example: '2026-03-01'
        paymentStatus:
          type: string
          enum:
            - ONGOING
            - FULLY_PAID
          example: FULLY_PAID
        items:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseOrderItemDTO'
    PurchaseOrderItemDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          readOnly: true
          example: 1
        productName:
          type: string
          example: Laptop Dock
        quantity:
          type: integer
          format: int32
          example: 2
        unitPrice:
          type: number
          format: double
          example: 125.50