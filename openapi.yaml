openapi: 3.0.3
info:
  title: Jakarta EE Purchase Order Tracking API
  version: 0.1.0
  description: OpenAPI specification for EMW Purchase Order Tracking API
servers:
  - url: http://localhost:8080/emw
    description: Local WildFly deployment
paths:
  /purchase-order:
    post:
      operationId: createPurchaseOrder
      tags:
        - Purchase Order
      summary: Creates a purchase order
      description: Saves one purchase order at a time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderDTO'
            examples:
              sample:
                value:
                  orderNumber: PO-2026-0003
                  customerName: Centro Manufacturing
                  orderDate: '2026-03-10'
      responses:
        '201':
          description: Purchase order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderDTO'
        '400':
          description: Invalid request payload
  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags:
        - Purchase Order
      summary: Lists all purchase orders
      description: Returns all purchase orders from the database.
      parameters:
        - in: query
          name: paymentStatus
          required: false
          description: Filters purchase orders by payment status.
          schema:
            type: string
            enum:
              - ONGOING
              - FULLY_PAID
        - in: query
          name: customer
          required: false
          description: Filters purchase orders by customer name.
          schema:
            type: string
      responses:
        '200':
          description: Purchase order list response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchaseOrderDTO'
              examples:
                sample:
                  value:
                    - id: 1
                      orderNumber: PO-2026-0001
                      customerName: Centro Manufacturing
                      orderDate: '2026-03-01'
                      paymentStatus: FULLY_PAID
                    - id: 2
                      orderNumber: PO-2026-0002
                      customerName: Hino Motors Philippines
                      orderDate: '2026-03-05'
                      paymentStatus: ONGOING
  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrderById
      tags:
        - Purchase Order
      summary: Gets purchase order details
      description: Returns one purchase order with purchase items and sales invoice items.
      parameters:
        - in: path
          name: id
          required: true
          description: Purchase order identifier.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Purchase order detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderDetailDTO'
              examples:
                sample:
                  value:
                    id: 1
                    orderNumber: PO-2026-0001
                    customerName: Centro Manufacturing
                    orderDate: '2026-03-01'
                    paymentStatus: ONGOING
                    purchaseItems:
                      - productId: 1
                        productName: Stainless Hinge with Handle
                        quantity: 3
                        unitPrice: 125.50
                      - productId: 2
                        productName: Stainless Hinge without Handle
                        quantity: 10
                        unitPrice: 8.99
                    salesInvoiceItems:
                      - productId: 1
                        productName: Stainless Hinge with Handle
                        quantity: 2
                        unitPrice: 125.50
                      - productId: 2
                        productName: Stainless Hinge without Handle
                        quantity: 10
                        unitPrice: 8.99
        '404':
          description: Purchase order not found
  /sales-invoice:
    post:
      operationId: createSalesInvoice
      tags:
        - Sales Invoice
      summary: Creates a sales invoice
      description: Saves one sales invoice with invoice items.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesInvoiceDTO'
            examples:
              sample:
                value:
                  invoiceNumber: SI-2026-0003
                  purchaseOrderNumber: PO-2026-0001
                  customerName: Centro Manufacturing
                  purchaseOrderDate: '2026-03-01'
                  invoiceDate: '2026-03-15'
                  salesInvoiceItems:
                    - productName: Stainless Hinge with Handle
                      quantity: 1
                      unitPrice: 125.50
                    - productName: Stainless Hinge without Handle
                      quantity: 2
                      unitPrice: 8.99
      responses:
        '201':
          description: Sales invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesInvoiceDTO'
        '400':
          description: Invalid request payload
components:
  schemas:
    PurchaseOrderDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        orderNumber:
          type: string
          example: PO-2026-0001
        customerName:
          type: string
          example: Centro Manufacturing
        orderDate:
          type: string
          format: date
          example: '2026-03-01'
        paymentStatus:
          type: string
          enum:
            - ONGOING
            - FULLY_PAID
          example: FULLY_PAID
    PurchaseOrderDetailDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        orderNumber:
          type: string
          example: PO-2026-0001
        customerName:
          type: string
          example: Centro Manufacturing
        orderDate:
          type: string
          format: date
          example: '2026-03-01'
        paymentStatus:
          type: string
          enum:
            - ONGOING
            - FULLY_PAID
          example: ONGOING
        purchaseItems:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseItemDTO'
        salesInvoiceItems:
          type: array
          items:
            $ref: '#/components/schemas/SalesInvoiceItemDTO'
    PurchaseItemDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          readOnly: true
          example: 1
        productName:
          type: string
          example: Stainless Hinge with Handle
        quantity:
          type: integer
          format: int32
          example: 3
        unitPrice:
          type: number
          format: double
          example: 125.50
    SalesInvoiceItemDTO:
      type: object
      properties:
        invoiceNumber:
          type: string
          example: SI-2026-0003
        productId:
          type: integer
          format: int64
          readOnly: true
          example: 1
        productName:
          type: string
          example: Stainless Hinge with Handle
        quantity:
          type: integer
          format: int32
          example: 2
        unitPrice:
          type: number
          format: double
          example: 125.50
    SalesInvoiceDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        invoiceNumber:
          type: string
          example: SI-2026-0003
        purchaseOrderNumber:
          type: string
          example: PO-2026-0001
        purchaseOrderId:
          type: integer
          format: int64
          example: 1
        customerName:
          type: string
          example: Centro Manufacturing
        purchaseOrderDate:
          type: string
          format: date
          example: '2026-03-01'
        invoiceDate:
          type: string
          format: date
          example: '2026-03-15'
        salesInvoiceItems:
          type: array
          items:
            $ref: '#/components/schemas/SalesInvoiceCreateItemDTO'
    SalesInvoiceCreateItemDTO:
      type: object
      properties:
        productName:
          type: string
          example: Stainless Hinge with Handle
        quantity:
          type: integer
          format: int32
          example: 1
        unitPrice:
          type: number
          format: double
          example: 125.50
