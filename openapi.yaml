openapi: 3.0.3
info:
  title: Jakarta EE Hello World API
  version: 0.1.0
  description: OpenAPI specification for the Jakarta EE sample application.
servers:
  - url: http://localhost:8080/jakartaee-hello-world
    description: Local WildFly deployment
paths:
  /rest/coffees:
    get:
      operationId: listCoffees
      tags:
        - Coffee
      summary: Lists all coffees
      description: Returns all coffee entries from the database.
      responses:
        '200':
          description: Coffee list response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CoffeeDTO'
              examples:
                sample:
                  value:
                    - id: 1
                      name: Coffee-A
                      price: '2.75'
                    - id: 2
                      name: Coffee-B
                      price: '1.99'
components:
  schemas:
    CoffeeDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: Coffee-A
        price:
          type: string
          example: '2.75'