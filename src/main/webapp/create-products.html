<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Product</title>
  <link rel="stylesheet" href="/emw/style.css">
</head>
<body>
  <main>
    <h1>Create Product</h1>
    <a href="/emw/" class="back-link">&#8592; Back to Purchase Orders</a>

    <div class="card">
      <form id="productForm" aria-label="Create product form">
        <div class="form-stack">
          <div class="form-field">
            <label for="productName">Product Name</label>
            <input id="productName" name="productName" type="text" required placeholder="Stainless Hinge with Handle">
          </div>
          <div class="form-field">
            <label for="description">Description (optional)</label>
            <input id="description" name="description" type="text" placeholder="Short product description">
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">Create Product</button>
          <button type="button" id="resetButton" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <p id="status" class="status-msg" role="status" aria-live="polite"></p>
  </main>

  <script>
    const form = document.getElementById('productForm');
    const resetButton = document.getElementById('resetButton');
    const statusEl = document.getElementById('status');

    function setStatus(message) {
      statusEl.textContent = message;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const productName = form.productName.value.trim();
      const descriptionRaw = form.description.value.trim();

      const payload = {
        productName,
        description: descriptionRaw.length > 0 ? descriptionRaw : null
      };

      setStatus('Creating product...');

      try {
        const response = await fetch('/emw/products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Accept: 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `Request failed with status ${response.status}`);
        }

        const created = await response.json();
        const createdName = created && created.productName ? created.productName : productName;
        setStatus(`Created product ${createdName}.`);
        alert(`Product ${createdName} created successfully.`);
        form.reset();
        window.location.href = '/emw/products.html';
      } catch (error) {
        setStatus(`Failed to create product: ${error.message}`);
      }
    });

    resetButton.addEventListener('click', () => {
      form.reset();
      setStatus('');
    });
  </script>
</body>
</html>
