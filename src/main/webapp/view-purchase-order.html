<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Order Detail</title>
  <link rel="stylesheet" href="/emw/style.css">
</head>
<body>
  <main>
    <h1>Purchase Order Detail</h1>
    <a href="/emw/" class="back-link">&#8592; Back to Purchase Orders</a>

    <p id="status" class="status-msg" role="status" aria-live="polite"></p>

    <section id="orderDetail" hidden>
      <div class="table-wrapper">
        <table>
          <tbody class="detail-tbody">
            <tr><th>ID</th><td id="detailId"></td></tr>
            <tr><th>Order Number</th><td id="detailOrderNumber"></td></tr>
            <tr><th>Customer</th><td id="detailCustomer"></td></tr>
            <tr><th>Order Date</th><td id="detailOrderDate"></td></tr>
            <tr><th>Payment Status</th><td id="detailPaymentStatus"></td></tr>
          </tbody>
        </table>
      </div>

      <h2>Purchase Items</h2>
      <div class="table-wrapper">
        <table id="purchaseItemsTable">
          <thead>
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Subtotal</th>
              <th>Not Yet Paid Qty</th>
            </tr>
          </thead>
          <tbody id="purchaseItemsBody"></tbody>
        </table>
      </div>

      <h2>Sales Invoice Items</h2>
      <div class="table-wrapper">
        <table id="salesInvoiceItemsTable">
          <thead>
            <tr>
              <th>Invoice Number</th>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Subtotal</th>
            </tr>
          </thead>
          <tbody id="salesInvoiceItemsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const orderDetail = document.getElementById('orderDetail');

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function formatAmount(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return '';
      }

      return number.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function getItemKey(item) {
      if (item?.productId != null) {
        return `id:${item.productId}`;
      }

      if (typeof item?.productName === 'string' && item.productName.trim().length > 0) {
        return `name:${item.productName.trim().toLowerCase()}`;
      }

      return 'unknown';
    }

    function renderPurchaseItems(items, salesInvoiceItems) {
      const tbody = document.getElementById('purchaseItemsBody');
      tbody.replaceChildren();

      if (!items || !items.length) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 5;
        cell.textContent = 'No purchase items.';
        row.appendChild(cell);
        tbody.appendChild(row);
        return;
      }

      const invoicedQuantityByItemKey = new Map();
      (Array.isArray(salesInvoiceItems) ? salesInvoiceItems : []).forEach((salesItem) => {
        const key = getItemKey(salesItem);
        const qty = Number(salesItem?.quantity ?? 0);
        const current = invoicedQuantityByItemKey.get(key) ?? 0;
        invoicedQuantityByItemKey.set(key, current + (Number.isFinite(qty) ? qty : 0));
      });

      items.forEach((item) => {
        const row = document.createElement('tr');

        const productCell = document.createElement('td');
        productCell.textContent = item.productName ?? '';
        row.appendChild(productCell);

        const qtyCell = document.createElement('td');
        qtyCell.textContent = item.quantity ?? '';
        row.appendChild(qtyCell);

        const priceCell = document.createElement('td');
        priceCell.textContent = item.unitPrice != null ? formatAmount(item.unitPrice) : '';
        row.appendChild(priceCell);

        const subtotalCell = document.createElement('td');
        const subtotal = (item.quantity ?? 0) * (item.unitPrice ?? 0);
        subtotalCell.textContent = formatAmount(subtotal);
        row.appendChild(subtotalCell);

        const notYetPaidQtyCell = document.createElement('td');
        const purchaseQty = Number(item?.quantity ?? 0);
        const invoicedQty = invoicedQuantityByItemKey.get(getItemKey(item)) ?? 0;
        const notYetPaidQty = purchaseQty - invoicedQty;
        notYetPaidQtyCell.textContent = Number.isFinite(notYetPaidQty) ? String(notYetPaidQty) : '';
        row.appendChild(notYetPaidQtyCell);

        tbody.appendChild(row);
      });
    }

    function renderSalesInvoiceItems(items) {
      const tbody = document.getElementById('salesInvoiceItemsBody');
      tbody.replaceChildren();

      if (!items || !items.length) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 5;
        cell.textContent = 'No sales invoice items.';
        row.appendChild(cell);
        tbody.appendChild(row);
        return;
      }

      items.forEach((item) => {
        const row = document.createElement('tr');

        const invoiceNumberCell = document.createElement('td');
        invoiceNumberCell.textContent = item.invoiceNumber ?? '';
        row.appendChild(invoiceNumberCell);

        const productCell = document.createElement('td');
        productCell.textContent = item.productName ?? '';
        row.appendChild(productCell);

        const qtyCell = document.createElement('td');
        qtyCell.textContent = item.quantity ?? '';
        row.appendChild(qtyCell);

        const priceCell = document.createElement('td');
        priceCell.textContent = item.unitPrice != null ? formatAmount(item.unitPrice) : '';
        row.appendChild(priceCell);

        const subtotalCell = document.createElement('td');
        const subtotal = (item.quantity ?? 0) * (item.unitPrice ?? 0);
        subtotalCell.textContent = formatAmount(subtotal);
        row.appendChild(subtotalCell);

        tbody.appendChild(row);
      });
    }

    async function loadOrderDetail(id) {
      setStatus('Loading purchase order...');

      try {
        const response = await fetch(`/emw/purchase-orders/${encodeURIComponent(id)}`, {
          headers: { Accept: 'application/json' }
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `Request failed with status ${response.status}`);
        }

        const order = await response.json();

        document.getElementById('detailId').textContent = order.id ?? '';
        document.getElementById('detailOrderNumber').textContent = order.orderNumber ?? '';
        document.getElementById('detailCustomer').textContent = order.customerName ?? '';
        document.getElementById('detailOrderDate').textContent = order.orderDate ?? '';
        const detailStatusEl = document.getElementById('detailPaymentStatus');
        const detailStatusVal = order.paymentStatus ?? '';
        if (detailStatusVal) {
          const badge = document.createElement('span');
          badge.className = `badge ${detailStatusVal === 'FULLY_PAID' ? 'badge-paid' : 'badge-ongoing'}`;
          badge.textContent = detailStatusVal;
          detailStatusEl.appendChild(badge);
        } else {
          detailStatusEl.textContent = '';
        }

        renderPurchaseItems(order.purchaseItems, order.salesInvoiceItems);
        renderSalesInvoiceItems(order.salesInvoiceItems);

        orderDetail.hidden = false;
        setStatus('');
      } catch (error) {
        setStatus(`Failed to load purchase order: ${error.message}`);
      }
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      setStatus('No purchase order ID provided.');
    } else {
      loadOrderDetail(id);
    }
  </script>
</body>
</html>
